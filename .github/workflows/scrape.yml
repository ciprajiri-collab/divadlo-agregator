name: Týdenní scraping divadel

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Stáhni repozitář
        uses: actions/checkout@v4

      - name: Nastav Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Nainstaluj závislosti
        run: pip install requests beautifulsoup4 lxml

      - name: Spusť scraper
        run: python deploy/scraper.py

      - name: Ulož výsledky
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add deploy/public/data.json
          git diff --staged --quiet || git commit -m "Aktualizace dat $(date '+%Y-%m-%d')"
          git push
